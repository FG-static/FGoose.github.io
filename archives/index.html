<script>
document.querySelectorAll('.ggb-float').forEach(function(el) {
  var MIN_W = 260;
  var EDGE_GAP = 24;
  if (el.querySelector('.ggb-title')) return;
  var parent = el.parentNode;
  var placeholder = document.createComment('ggb-float-placeholder');
  parent.insertBefore(placeholder, el);

  var title = document.createElement('span');
  title.className = 'ggb-title';
  title.textContent = 'GeoGebra';
  el.insertBefore(title, el.firstChild);

  var resizeHandle = document.createElement('div');
  resizeHandle.className = 'ggb-resize-handle';
  resizeHandle.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14h12M2 14v-12M14 14v-12"/></svg>';
  el.appendChild(resizeHandle);

  var mode = null;
  var startX, startY, startW, startLeft, startTop;
  var detached = false;

  function clearDockStyles() {
    if (mode) return;
    el.style.position = '';
    el.style.top = '';
    el.style.left = '';
    el.style.right = '';
    el.style.width = '';
    el.style.margin = '';
    el.style.float = '';
    el.style.transform = '';
  }

  function syncDockState() {
    var shouldDetach = window.innerWidth >= 768;

    if (shouldDetach && !detached) {
      document.body.appendChild(el);
      el.classList.add('is-detached');
      detached = true;
      clearDockStyles();
      return;
    }

    if (!shouldDetach && detached) {
      if (placeholder.parentNode) {
        placeholder.parentNode.insertBefore(el, placeholder.nextSibling);
      } else {
        parent.appendChild(el);
      }
      el.classList.remove('is-detached');
      detached = false;
      clearDockStyles();
    }
  }

  function toFixed() {
    var rect = el.getBoundingClientRect();
    el.style.width = rect.width + 'px';
    el.style.position = 'fixed';
    el.style.top = rect.top + 'px';
    el.style.left = rect.left + 'px';
    el.style.right = 'auto';
    el.style.float = 'none';
    el.style.margin = '0';
    el.style.transform = 'none';
  }

  function startDrag(e, m) {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    mode = m;
    startX = e.clientX;
    startY = e.clientY;
    toFixed();
    startLeft = parseFloat(el.style.left);
    startTop = parseFloat(el.style.top);
    startW = el.offsetWidth;
    document.body.style.userSelect = 'none';
    el.classList.add('is-interacting');
  }

  title.addEventListener('mousedown', function(e) {
    startDrag(e, 'drag');
  });

  resizeHandle.addEventListener('mousedown', function(e) {
    startDrag(e, 'resize');
  });

  document.addEventListener('mousemove', function(e) {
    if (!mode) return;
    var dx = e.clientX - startX;
    var dy = e.clientY - startY;
    if (mode === 'drag') {
      el.style.left = (startLeft + dx) + 'px';
      el.style.top = (startTop + dy) + 'px';
    } else {
      var maxW = Math.max(MIN_W, window.innerWidth - EDGE_GAP * 2);
      var newW = Math.min(maxW, Math.max(MIN_W, startW + dx));
      el.style.width = newW + 'px';
    }
  });

  document.addEventListener('mouseup', function() {
    if (mode) {
      mode = null;
      document.body.style.userSelect = '';
      el.classList.remove('is-interacting');
    }
  });

  syncDockState();
  window.addEventListener('resize', syncDockState);
});
</script>
