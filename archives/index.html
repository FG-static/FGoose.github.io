<script>
document.querySelectorAll('.ggb-float').forEach(function(el) {
  var MIN_W = 260;
  if (el.querySelector('.ggb-title')) return;

  var title = document.createElement('span');
  title.className = 'ggb-title';
  title.textContent = 'GeoGebra';
  el.insertBefore(title, el.firstChild);

  var dragHandle = document.createElement('div');
  dragHandle.className = 'ggb-drag-handle';
  dragHandle.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8h12M8 2v12M2 2l4 4M14 2l-4 4M2 14l4-4M14 14l-4-4"/></svg>';
  el.appendChild(dragHandle);

  var resizeHandle = document.createElement('div');
  resizeHandle.className = 'ggb-resize-handle';
  resizeHandle.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14h12M2 14v-12M14 14v-12"/></svg>';
  el.appendChild(resizeHandle);

  var mode = null;
  var startX, startY, startW, startLeft, startTop;

  function toFixed() {
    var rect = el.getBoundingClientRect();
    el.style.width = rect.width + 'px';
    el.style.position = 'fixed';
    el.style.top = rect.top + 'px';
    el.style.left = rect.left + 'px';
    el.style.right = 'auto';
    el.style.float = 'none';
    el.style.margin = '0';
  }

  function startDrag(e, m) {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    mode = m;
    startX = e.clientX;
    startY = e.clientY;
    toFixed();
    startLeft = parseFloat(el.style.left);
    startTop = parseFloat(el.style.top);
    startW = el.offsetWidth;
    document.body.style.userSelect = 'none';
    el.classList.add('is-interacting');
  }

  dragHandle.addEventListener('mousedown', function(e) {
    startDrag(e, 'drag');
  });

  title.addEventListener('mousedown', function(e) {
    startDrag(e, 'drag');
  });

  resizeHandle.addEventListener('mousedown', function(e) {
    startDrag(e, 'resize');
  });

  document.addEventListener('mousemove', function(e) {
    if (!mode) return;
    var dx = e.clientX - startX;
    var dy = e.clientY - startY;
    if (mode === 'drag') {
      el.style.left = (startLeft + dx) + 'px';
      el.style.top = (startTop + dy) + 'px';
    } else {
      var newW = Math.max(MIN_W, startW - dx);
      el.style.width = newW + 'px';
      el.style.left = (startLeft + startW - newW) + 'px';
    }
  });

  document.addEventListener('mouseup', function() {
    if (mode) {
      mode = null;
      document.body.style.userSelect = '';
      el.classList.remove('is-interacting');
    }
  });
});
</script>
